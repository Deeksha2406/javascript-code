<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>

    <!-- Correct Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    
  <button style="background-color: blue; color: white; padding: 15px 30px; font-size: 20px; border: none; border-radius: 5px;">
      Big Button
    </button>

    <!-- Small Button -->
    <button style="background-color: blue; color: white; padding: 5px 10px; font-size: 12px; border: none; border-radius: 5px;">
      Small Button
    </button>
    

<!-- Button -->
<div class="container mt-3">
    <button class="btn btn-outline-primary">Outline</button>
</div>

  

<!-- Card with Image -->
<div class="container mt-4">
    <div class="card" style="width: 18rem;">
        <img src="https://via.placeholder.com/300x150" class="card-img-top" alt="product">
        <div class="card-body">
            <h5 class="card-title">Product Title</h5>
            <p class="card-text">Short description of product</p>
            <a href="#" class="btn btn-primary">Buy Now</a>
        </div>
    </div>
</div>

<!-- Grid Cards -->
<div class="container mt-4">
    <div class="row">
        
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card 1</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card 2</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">Card 3</div>
            </div>
        </div>

    </div>
</div>

<!-- Alerts -->
<div class="container mt-4">

    <div class="alert alert-success">
        Payment successful!
    </div>

    <div class="alert alert-danger">
        Error! Something went wrong
    </div>

    <div class="alert alert-warning">
        Please check your input
    </div>

    <div class="alert alert-info">
        New update available
    </div>

    <!-- Dismissible Alert -->
    <div class="alert alert-warning alert-dismissible fade show">
        Warning message
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

</div>

<!-- Badge -->
<div class="container mt-3">
    <span class="badge bg-success">New</span>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
