<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <!--move the element-->
    <div class="move-right">Hover over me to move!</div>
    <hr>
    <!--zoom the element-->
    <div class="zoom-effect">Hover over me to zoom !</div>
    <hr>
    <!--tilt the element-->
    <div class="tilt-effect">Hover over me to tilt!</div>
    <hr>
    <!--rotate the element-->
    <div class="rotate-effect">Hover over me to rotate!</div>
    <hr> 
    <!-- the element-->
    <div class="trans"></div>
    <hr>
    <!--fade in-->
    <div class="fade-in">Welcome to CSS!</div>
      <hr>
      <div class="slid-in">Welcome to CSS!</div>
      <hr>
      <div class="bounce"></div>
</body>
</html>
